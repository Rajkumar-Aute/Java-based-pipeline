# ==============================================================================
# Workflow Name: Java CI/CD Enterprise Pipeline
# Purpose: Defines an automated DevSecOps lifecycle for a Java (Maven) application.
# It integrates Continuous Integration (CI), Continuous Delivery (CD), and 
# Continuous Security (Sec) into a single declarative pipeline.
# ==============================================================================
name: Java CI/CD Enterprise Pipeline

# ------------------------------------------------------------------------------
# 1. TRIGGERS (on:)
# Defines the events that will cause this pipeline to execute.
# ------------------------------------------------------------------------------
on:
  # Triggers the pipeline automatically whenever code is merged or pushed directly 
  # to the 'main' branch.
  push:
    branches: [ "main" ]
  
  # Triggers the pipeline when a Pull Request is opened or updated against 
  # the 'main' branch. This enforces "shift-left" security and testing before code is merged.
  pull_request:
    branches: [ "main" ]

# ------------------------------------------------------------------------------
# 2. JOBS (jobs:)
# Defines the independent units of work. By default, jobs run in parallel, 
# but we will use the 'needs' keyword to sequence them into a pipeline structure.
# ------------------------------------------------------------------------------
jobs:

  # ============================================================================
  # JOB 1: Continuous Integration (Build & Test)
  # Goal: Ensure the application compiles successfully and passes all unit tests.
  # ============================================================================
  build-and-test:
    # Specifies the runner environment. 'ubuntu-latest' provides a clean, 
    # ephemeral Linux virtual machine hosted by GitHub.
    runs-on: ubuntu-latest
    
    steps:
    # Step 1.1: Fetch the source code from the repository into the runner environment.
    # We use the official 'checkout' action.
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 1.2: Install and configure the Java Development Kit (JDK).
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'           # Specifies Java 17 (LTS).
        distribution: 'temurin'      # Uses the Eclipse Temurin distribution.
        cache: 'maven'               # Drastically speeds up subsequent builds by caching downloaded dependencies (~/.m2).

    # Step 1.3: Compile the code and package it.
    # '-B' runs Maven in non-interactive (batch) mode to prevent log spam.
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # Step 1.4: Execute Unit Tests to verify code logic.
    # If a test fails, the pipeline halts immediately, preventing broken code from advancing.
    - name: Run Unit Tests
      run: mvn test

    # Step 1.5: Preserve the compiled binary.
    # The runner is destroyed after the job finishes. We upload the generated .jar file 
    # so it can be passed to subsequent jobs (like Dockerization) without rebuilding.
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: java-app-package       # The identifier used to retrieve this artifact later.
        path: target/*.jar           # The file path to grab the compiled Java Archive.

  # ============================================================================
  # JOB 2: Continuous Security & Quality (DevSecOps Core)
  # Goal: Identify vulnerabilities and code smells before deployment.
  # ============================================================================
  security-and-quality:
    # The 'needs' directive creates a dependency map. This job will ONLY start 
    # if 'build-and-test' finishes successfully.
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    # Step 2.1: We must checkout the code again because this job runs on a brand new, 
    # isolated virtual machine runner.
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2.2: Software Composition Analysis (SCA).
    # Scans the pom.xml for open-source dependencies (third-party libraries) with known CVEs.
    # This is a critical DevSecOps practice to prevent supply chain attacks.
    - name: Dependency Check (Snyk or OWASP)
      uses: snyk/actions/maven@master
      env:
        # Securely injects the Snyk API token stored in GitHub Repository Secrets.
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # Step 2.3: Static Application Security Testing (SAST) & Code Quality.
    # Analyzes the raw source code for bugs, vulnerabilities (like SQL injection), and technical debt.
    - name: Static Analysis (SonarCloud)
      run: mvn sonar:sonar -Dsonar.projectKey=my_project -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  # ============================================================================
  # JOB 3: Continuous Delivery (Containerization)
  # Goal: Package the tested, secure application into an immutable Docker image 
  # and push it to a container registry.
  # ============================================================================
  dockerize:
    # This job waits for the security scans to pass. If vulnerabilities are found, 
    # the pipeline breaks, and a vulnerable image is never built.
    needs: security-and-quality
    
    # Conditional execution: We only want to build and push Docker images for 
    # code that is actually merged into the 'main' branch, not for active Pull Requests.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    # Step 3.1: Retrieve the .jar file we compiled in Job 1.
    # This ensures we are containerizing the exact binary that passed our tests, 
    # adhering to the principle of immutability.
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: java-app-package       # Matches the name used in the upload step.

    # Step 3.2: Build and push the Docker image.
    - name: Build & Push Docker Image
      run: |
        # 1. Build the image. 
        # We tag (-t) the image using the unique GitHub commit SHA (${{ github.sha }}).
        # This provides perfect traceability from the container back to the exact code commit.
        docker build -t my-repo/java-app:${{ github.sha }} .
        
        # 2. Authenticate with the Docker Registry (e.g., DockerHub, AWS ECR, ACR).
        # We pipe the password into 'docker login' via standard input for security, 
        # preventing the password from appearing in process lists or logs.
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        
        # 3. Push the immutable, tagged image to the remote registry, ready for deployment (e.g., to Kubernetes/EKS).
        docker push my-repo/java-app:${{ github.sha }}