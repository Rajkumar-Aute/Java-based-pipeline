name: Java CI Enterprise Pipeline
# Defines the events that will cause this pipeline to execute. 
  # Triggers can be based on code changes, scheduled times, or manual invocation.
on:
  # Triggers the pipeline automatically whenever code is merged or pushed directly to the 'main' branch.
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Jobs are the core building blocks of our CI/CD pipeline, representing distinct stages like Build, Test, Security Scanning, and Dockerization.
# Defines the independent units of work. By default, jobs run in parallel, but we will use the 'needs' keyword to sequence them into a pipeline structure.
jobs:
  # job 1: Continuous Integration (Build, Test and Security)
  # Goal: Ensure the application compiles successfully and passes all unit tests.
  build-test-and-secure:
    # Specifies the runner environment. 'ubuntu-latest' provides a clean, ephemeral Linux virtual machine hosted by GitHub.
    runs-on: ubuntu-latest
    steps:
    # Step 1.1: Fetch the source code from the repository into the runner environment.
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 1.2: Install and configure the Java Development Kit (JDK).
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'           # Specifies Java 17 (LTS).
        distribution: 'temurin'      # Uses the Eclipse Temurin distribution.
        cache: 'maven'               # Drastically speeds up subsequent builds by caching downloaded dependencies (~/.m2).

    # Step 1.3: Compile the code and package it.
    # '-B' runs Maven in non-interactive (batch) mode to prevent log spam.
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # Step 1.4: Execute Unit Tests to verify code logic.
    # If a test fails, the pipeline halts immediately, preventing broken code from next stages.
    - name: Run Unit Tests
      run: mvn test

  # Goal: Identify vulnerabilities and code smells before deployment.
    # Step 1.5: Software Composition Analysis (SCA).
    # Scans the pom.xml for open-source dependencies (third-party libraries) with known CVEs.
    # This is a critical DevSecOps practice to prevent supply chain attacks.
# disabled scan due to unavailability of snyk and sonar tokens
    # - name: Dependency Check (Snyk or OWASP)
    #   uses: snyk/actions/maven@master
    #   env:
    #     # Securely injects the Snyk API token stored in GitHub Repository Secrets.
    #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # # Step 1.6: Static Application Security Testing (SAST) & Code Quality.
    # # Analyzes the raw source code for bugs, vulnerabilities (like SQL injection), and technical debt.
    # - name: Static Analysis (SonarCloud)
    #   run: mvn sonar:sonar -Dsonar.projectKey=my_project -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # Step 1.7: Preserve the compiled binary.
    # The runner is destroyed after the job finishes. We upload the generated .jar file as an artifact to GitHub Actions storage,
    # so it can be passed to subsequent jobs (like Dockerization) without rebuilding.
    # This actions not requires if we are using same runner for all the jobs.
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: java-app-package       # The identifier used to retrieve this artifact later.
        path: target/*.jar           # The file path to grab the compiled Java Archive.
  # JOB 2: Continuous Delivery (Containerization)
  # Goal: Package the tested, secure application into an immutable Docker image 
  # and push it to a container registry.

  dockerize:
    # Conditional execution: We only want to build and push Docker images for 
    # code that is actually merged into the 'main' branch, not for active Pull Requests.
    needs: build-test-and-secure
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    # Step 2.1: Retrieve the .jar file we compiled in Job 1.
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: java-app-package
        path: target/

    # Step 2.2: Build and push the Docker image.
    - name: Build & Push Docker Image
      run: |
        # This creates one image, with multiple searchable labels.
        docker build \
          -f Dockerfile-GithubActions \
          -t ${{ secrets.DOCKER_USERNAME }}/java-base-app:${{ github.sha }} \
          -t ${{ secrets.DOCKER_USERNAME }}/java-base-app:${{ github.run_number }} \
          .

    # Step 2.3: Scan the Docker Image using Trivy (DevSecOps best practice)
    # This will fail the pipeline if "CRITICAL" vulnerabilities are found.
    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKER_USERNAME }}/java-base-app:${{ github.sha }}'
        format: 'table'
        exit-code: '0' # if this "1" fails the build if vulnerabilities are found
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # 2. Authenticate with Docker Hub.
    - name: Login and Push to Docker Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        
        # 3. Push both tags
        docker push ${{ secrets.DOCKER_USERNAME }}/java-base-app:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/java-base-app:${{ github.run_number }}
